<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Books</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            width: 250px;
            margin: 15px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ddd;
        }

        .card h3 {
            color: #2c3e50;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 12px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background: #2980b9;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>📖 All Books</h1>
</div>

<div class="container">

    {% for book in books %}
    <div class="card">
        <h3>{{ book.title }}</h3>
        <p>👨‍🏫 {{ book.author.name }}</p>
        <p>📅 {{ book.published_year }}</p>

        <a class="btn" href="{{ book.get_absolute_url }}">View</a>
    </div>
    {% endfor %}

</div>

</body>
</html>
