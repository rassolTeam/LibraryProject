<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>{{ book.title }}</title>

    <style>
        body {
            font-family: Arial;
            background: #eef2f3;
            margin: 0;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }

        h1 {
            color: #2c3e50;
        }

        .info {
            margin-top: 10px;
        }

        .btn {
            display: inline-block;
            padding: 10px 15px;
            background: #27ae60;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>{{ book.title }}</h1>

    <div class="info">
        <p>👨‍🏫 المؤلف: {{ book.author.name }}</p>
        <p>📚 التصنيف: {{ book.category.name }}</p>
        <p>📅 سنة النشر: {{ book.published_year }}</p>
        <p>👁 المشاهدات: {{ book.views_count }}</p>
    </div>

    <p>{{ book.description }}</p>

    {% if book.pdf_file %}
        <a class="btn" href="{{ book.pdf_file.url }}">📥 تحميل الكتاب</a>
    {% endif %}

</div>

</body>
</html>
